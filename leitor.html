<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor | Mangakai</title>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        header { width: 100%; background: #111; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ff1212; box-sizing: border-box; }
        .btn-voltar { color: white; text-decoration: none; font-weight: bold; font-family: sans-serif; font-size: 0.9rem; border: 1px solid #333; padding: 5px 15px; border-radius: 20px; }
        .manga-name { color: white; font-family: sans-serif; font-size: 0.9rem; font-weight: bold; }
        .container { width: 100%; max-width: 800px; }
        img { width: 100%; height: auto; display: block; }
        .error-msg { color: white; text-align: center; padding: 50px; font-family: sans-serif; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-voltar">← VOLTAR</a>
        <span class="manga-name" id="titulo-topo">Carregando...</span>
        <div style="width:70px;"></div>
    </header>

    <div class="container" id="manga-viewer">
        </div>

    <script>
        // Pega as informações do link (URL)
        const params = new URLSearchParams(window.location.search);
        const manga = params.get('manga');
        const cap = params.get('cap');
        const imgName = params.get('img');

        if(manga && cap && imgName) {
            document.getElementById('titulo-topo').innerText = `${manga} - ${cap}`;
            const viewer = document.getElementById('manga-viewer');
            const imgElement = document.createElement('img');
            
            // Monta o caminho: mangas/Jujutsu Kaisen/Cap01/completo.jpg.webp
            imgElement.src = `mangas/${manga}/${cap}/${imgName}`;
            
            imgElement.onerror = function() {
                viewer.innerHTML = `<div class="error-msg">
                    <p>Página não encontrada!</p>
                    <small>Verifique se o nome do arquivo no GitHub é exatamente: <b>${imgName}</b></small>
                </div>`;
            };
            
            viewer.appendChild(imgElement);
        }
    </script>
</body>
</html>
