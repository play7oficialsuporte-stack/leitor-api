<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Completo | Mangakai</title>
    <style>
        /* Fundo preto para focar na leitura */
        body { background: #000; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra de navegação fixa */
        header { 
            width: 100%; background: #111; padding: 15px; 
            position: sticky; top: 0; z-index: 100; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #ff1212; box-sizing: border-box;
        }
        
        .btn-voltar { 
            color: white; text-decoration: none; font-weight: bold; 
            font-family: sans-serif; font-size: 0.9rem; 
            border: 1px solid #333; padding: 5px 15px; border-radius: 20px; 
        }

        /* Container da Imagem: IMPORTANTE */
        .manga-container { width: 100%; max-width: 100vw; display: block; }
        
        /* Ajuste da Imagem para não cortar */
        img { 
            width: 100%; 
            height: auto; /* Deixa a altura ser definida pelo arquivo */
            display: block; 
            image-rendering: auto;
        }

        .error-msg { color: white; text-align: center; padding: 50px; font-family: sans-serif; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-voltar">← VOLTAR</a>
        <span style="color:white; font-family:sans-serif;" id="titulo-topo">Carregando...</span>
        <div style="width:70px;"></div>
    </header>

    <div class="manga-container" id="leitor">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const manga = params.get('manga');
        const cap = params.get('cap');
        const imgName = params.get('img');

        if(manga && cap && imgName) {
            document.getElementById('titulo-topo').innerText = `${manga} - ${cap}`;
            const display = document.getElementById('leitor');
            const imagem = document.createElement('img');
            
            // Caminho configurado para o seu GitHub
            imagem.src = `mangas/${manga}/${cap}/${imgName}`;
            
            imagem.onerror = function() {
                display.innerHTML = `<div class="error-msg">Erro ao carregar o capítulo.</div>`;
            };
            
            display.appendChild(imagem);
        }
    </script>
</body>
</html>
