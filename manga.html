<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - TOOM-CLONE</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Banner com Gradiente Toomics */
        .banner-manga { 
            width: 100%; 
            height: 400px; 
            background-size: cover; 
            background-position: center; 
            position: relative; 
        }
        .overlay { 
            background: linear-gradient(0deg, var(--bg) 10%, rgba(0,0,0,0.5) 100%); 
            height: 100%; width: 100%; 
            display: flex; align-items: flex-end; 
            padding: 20px; box-sizing: border-box; 
        }
        
        .manga-header-info { z-index: 2; width: 100%; }
        .manga-header-info h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9); 
        }

        /* Botão Voltar Estilizado */
        .voltar-btn { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); color: white; 
            border: 1px solid var(--primary); padding: 8px 15px; 
            border-radius: 20px; cursor: pointer; z-index: 10; 
            font-weight: bold; font-size: 0.8rem;
        }

        /* Seções com Borda Lateral conforme solicitado */
        .section-label { 
            padding: 12px 20px; 
            font-weight: bold; 
            border-left: 5px solid var(--primary); 
            margin: 20px 0 10px 0; 
            background: #111;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .description { 
            padding: 0 20px; 
            font-size: 0.9rem; 
            color: #aaa; 
            line-height: 1.6; 
            text-align: justify;
        }

        /* Lista de Capítulos Estilo App */
        .cap-list { list-style: none; padding: 0; margin: 10px 0; }
        .cap-item { 
            display: flex; 
            align-items: center; 
            padding: 18px 20px; 
            border-bottom: 1px solid #1a1a1a; 
            text-decoration: none; 
            color: #efefef; 
            background: #0d0d0d;
        }
        .cap-item:active { background: #1a1a1a; }
        
        .cap-number { 
            background: var(--primary); 
            color: white; 
            padding: 5px 10px; 
            border-radius: 4px; 
            margin-right: 15px; 
            font-weight: bold; 
            font-size: 0.75rem; 
            min-width: 50px;
            text-align: center;
        }
        
        .cap-info { display: flex; flex-direction: column; }
        .cap-title { font-size: 0.9rem; font-weight: 500; }
        .cap-date { font-size: 0.7rem; color: #666; margin-top: 4px; }

        .loading-status { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <button class="voltar-btn" onclick="window.history.back()">← VOLTAR</button>

    <div id="manga-banner" class="banner-manga">
        <div class="overlay">
            <div class="manga-header-info">
                <h1 id="manga-titulo">Carregando...</h1>
            </div>
        </div>
    </div>

    <div class="section-label">Sinopse</div>
    <div id="manga-descricao" class="description">Buscando resumo oficial...</div>

    <div class="section-label">Capítulos Disponíveis</div>
    <div id="lista-capitulos" class="cap-list">
        <div class="loading-status">Conectando ao servidor MangaDex...</div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');

        async function carregarPaginaManga() {
            if(!mangaId) {
                alert("ID do mangá não encontrado!");
                return;
            }

            try {
                // 1. Puxar Dados Básicos e Capa
                const respManga = await fetch(`https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`);
                const mangaData = await respManga.json();
                const info = mangaData.data;
                
                // Título
                const tituloFinal = info.attributes.title.en || info.attributes.title.ja_ro || Object.values(info.attributes.title)[0];
                document.getElementById('manga-titulo').innerText = tituloFinal;
                document.title = tituloFinal + " - TOOM-CLONE";

                // Descrição (Prioridade PT-BR)
                const desc = info.attributes.description.pt || info.attributes.description.en || "Descrição não disponível em português.";
                document.getElementById('manga-descricao').innerText = desc.split('---')[0].split('***')[0];

                // Banner em alta qualidade
                const coverObj = info.relationships.find(r => r.type === 'cover_art');
                if (coverObj) {
                    const coverFile = coverObj.attributes.fileName;
                    document.getElementById('manga-banner').style.backgroundImage = `url(https://uploads.mangadex.org/covers/${mangaId}/${coverFile})`;
                }

                // 2. Puxar Capítulos usando a função do js/api.js
                const caps = await getMangaChapters(mangaId);
                const container = document.getElementById('lista-capitulos');
                
                if(!caps || caps.length === 0) {
                    container.innerHTML = "<div class='loading-status' style='color:#666;'>Nenhum capítulo em Português (BR) disponível no momento.</div>";
                    return;
                }

                container.innerHTML = caps.map(c => `
                    <a class="cap-item" href="leia.html?id=${c.id}">
                        <div class="cap-number">CAP ${c.attributes.chapter}</div>
                        <div class="cap-info">
                            <span class="cap-title">${c.attributes.title || 'Ler Capítulo ' + c.attributes.chapter}</span>
                            <span class="cap-date">Disponível em PT-BR</span>
                        </div>
                    </a>
                `).join('');

            } catch (error) {
                console.error("Erro fatal:", error);
                document.getElementById('manga-titulo').innerText = "Erro na Conexão";
                document.getElementById('lista-capitulos').innerHTML = "<div class='loading-status'>Falha ao carregar capítulos. Tente novamente mais tarde.</div>";
            }
        }

        window.onload = carregarPaginaManga;
    </script>
</body>
</html>
