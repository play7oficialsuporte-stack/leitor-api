<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - MangaCloud</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        
        /* O CSS que você enviou, integrado */
        .banner-manga { width: 100%; height: 300px; background-size: cover; background-position: center; position: relative; }
        .overlay { background: linear-gradient(0deg, var(--bg) 10%, transparent 100%); height: 100%; width: 100%; display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        
        .manga-header-info { z-index: 2; }
        .cap-list { list-style: none; padding: 0; margin-top: 20px; }
        .cap-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; text-decoration: none; color: #ccc; transition: 0.2s; }
        .cap-item:hover { background: #151515; }
        .cap-number { background: var(--primary); color: white; padding: 6px 10px; border-radius: 4px; margin-right: 15px; font-weight: bold; font-size: 0.9rem; }
        
        .voltar-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; z-index: 10; }
        .description { padding: 20px; font-size: 0.9rem; color: #aaa; line-height: 1.4; }
    </style>
</head>
<body>

    <button class="voltar-btn" onclick="window.history.back()">← Voltar</button>

    <div id="manga-banner" class="banner-manga">
        <div class="overlay">
            <div class="manga-header-info">
                <h1 id="manga-titulo" style="margin: 0;">Carregando...</h1>
            </div>
        </div>
    </div>

    <div id="manga-descricao" class="description"></div>

    <div style="padding: 0 20px;">
        <h3 style="border-left: 4px solid var(--primary); padding-left: 10px;">Episódios</h3>
        <div id="lista-capitulos" class="cap-list"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');

        async function carregarPaginaManga() {
            if(!mangaId) return;

            // 1. Buscar detalhes do mangá (para título e banner)
            const respManga = await fetch(`https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`);
            const mangaData = await respManga.json();
            const info = mangaData.data;
            
            // Título e Descrição
            document.getElementById('manga-titulo').innerText = info.attributes.title.en || info.attributes.title.ja_ro;
            document.getElementById('manga-descricao').innerText = info.attributes.description.en || "Sem descrição disponível.";

            // Banner (Usando a capa como fundo)
            const coverObj = info.relationships.find(r => r.type === 'cover_art');
            const coverFile = coverObj.attributes.fileName;
            document.getElementById('manga-banner').style.backgroundImage = `url(https://uploads.mangadex.org/covers/${mangaId}/${coverFile})`;

            // 2. Buscar Capítulos
            const caps = await getMangaChapters(mangaId);
            const container = document.getElementById('lista-capitulos');
            
            if(caps.length === 0) {
                container.innerHTML = "<p style='padding:20px'>Nenhum capítulo em PT-BR.</p>";
                return;
            }

            container.innerHTML = caps.map(c => `
                <a class="cap-item" href="read.html?id=${c.id}">
                    <span class="cap-number">CAP ${c.attributes.chapter}</span>
                    <span>${c.attributes.title || 'Ler capítulo'}</span>
                </a>
            `).join('');
        }
        carregarPaginaManga();
    </script>
</body>
</html>
