<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - TOOM-CLONE</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Banner Estilo Toomics */
        .banner-manga { width: 100%; height: 350px; background-size: cover; background-position: center; position: relative; background-color: #111; }
        .overlay { background: linear-gradient(0deg, var(--bg) 15%, transparent 100%); height: 100%; width: 100%; display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .manga-header-info h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; text-shadow: 2px 2px 4px #000; }
        
        /* Botão Voltar */
        .voltar-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; border: 1px solid var(--primary); padding: 10px 18px; border-radius: 20px; cursor: pointer; z-index: 10; font-weight: bold; }
        
        /* Seções com Borda Lateral */
        .section-label { padding: 12px 20px; font-weight: bold; border-left: 5px solid var(--primary); margin: 20px 0 10px 0; background: #111; text-transform: uppercase; font-size: 0.9rem; }
        .description { padding: 0 20px; font-size: 0.9rem; color: #aaa; line-height: 1.5; text-align: justify; }
        
        /* Lista de Capítulos */
        .cap-list { list-style: none; padding: 0; margin: 0; }
        .cap-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1a1a1a; text-decoration: none; color: #fff; }
        .cap-item:active { background: #222; }
        .cap-number { background: var(--primary); color: white; padding: 5px 10px; border-radius: 4px; margin-right: 15px; font-weight: bold; font-size: 0.8rem; min-width: 45px; text-align: center; }
        
        .loading-msg { padding: 20px; text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <button class="voltar-btn" onclick="window.history.back()">← VOLTAR</button>

    <div id="manga-banner" class="banner-manga">
        <div class="overlay">
            <div class="manga-header-info">
                <h1 id="manga-titulo">Carregando...</h1>
            </div>
        </div>
    </div>

    <div class="section-label">Sinopse</div>
    <div id="manga-descricao" class="description">Buscando informações oficiais...</div>

    <div class="section-label">Episódios Disponíveis (PT-BR)</div>
    <div id="lista-capitulos" class="cap-list">
        <div class="loading-msg">Conectando ao servidor...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');

        // Proxy para evitar erro de conexão (CORS) em navegadores móveis
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function carregarManga() {
            if(!mangaId) return;
            const container = document.getElementById('lista-capitulos');

            try {
                // 1. Buscar Dados do Mangá
                const mangaUrl = `https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`;
                const res = await fetch(`${PROXY}${encodeURIComponent(mangaUrl)}`);
                const json = await res.json();
                const m = json.data;

                // Preencher Título e Sinopse
                document.getElementById('manga-titulo').innerText = m.attributes.title.en || Object.values(m.attributes.title)[0];
                const desc = m.attributes.description.pt || m.attributes.description.en || "Sinopse não disponível em português.";
                document.getElementById('manga-descricao').innerText = desc.split('---')[0];

                // Preencher Banner
                const cover = m.relationships.find(r => r.type === 'cover_art');
                if(cover) {
                    const imgUrl = `https://uploads.mangadex.org/covers/${mangaId}/${cover.attributes.fileName}`;
                    document.getElementById('manga-banner').style.backgroundImage = `url(${imgUrl})`;
                }

                // 2. Buscar Capítulos em Português
                const feedUrl = `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=pt-br&order[chapter]=desc&limit=100&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica&contentRating[]=pornographic`;
                const resCap = await fetch(`${PROXY}${encodeURIComponent(feedUrl)}`);
                const jsonCap = await resCap.json();
                
                if(!jsonCap.data || jsonCap.data.length === 0) {
                    container.innerHTML = "<p style='padding:20px; color:#666;'>Nenhum capítulo em Português (BR) encontrado para este título.</p>";
                    return;
                }

                // Renderizar a lista de capítulos
                container.innerHTML = jsonCap.data.map(c => `
                    <a class="cap-item" href="leia.html?id=${c.id}">
                        <span class="cap-number">CAP ${c.attributes.chapter}</span>
                        <span>${c.attributes.title || 'Ler este capítulo'}</span>
                    </a>
                `).join('');

            } catch (e) {
                console.error("Erro de busca:", e);
                document.getElementById('manga-titulo').innerText = "Erro de Conexão";
                container.innerHTML = "<p style='padding:20px; color:red;'>Falha ao conectar com o servidor da MangaDex. Tente recarregar a página.</p>";
            }
        }

        window.onload = carregarManga;
    </script>
</body>
</html>
