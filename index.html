<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>YouTube Reward Button</title>

<!-- =========================
     SCRIPT DO ANÚNCIO
========================= -->
<script>
(function(s){
    s.dataset.zone='10997845';
    s.src='https://n6wxm.com/vignette.min.js';
})
(
    [document.documentElement, document.body]
    .filter(Boolean)
    .pop()
    .appendChild(document.createElement('script'))
);
</script>

<style>

/* =========================
   FUNDO
========================= */

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    radial-gradient(circle at top,#1f1f1f,#090909);

    font-family:Arial, sans-serif;

    overflow:hidden;
}

/* =========================
   CARD
========================= */

.card{

    width:320px;

    padding:35px 25px;

    border-radius:30px;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.5);

    text-align:center;

    animation:entrada 1s ease;
}

@keyframes entrada{
    from{
        transform:translateY(30px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* =========================
   TÍTULO
========================= */

h1{
    color:white;
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#cfcfcf;
    font-size:15px;
    line-height:1.5;
    margin-bottom:30px;
}

/* =========================
   BOTÃO
========================= */

.youtube-btn{

    position:relative;

    width:100%;

    border:none;

    padding:18px;

    border-radius:20px;

    font-size:20px;

    font-weight:bold;

    color:white;

    cursor:pointer;

    overflow:hidden;

    background:
    linear-gradient(135deg,#ff0000,#ff4d4d);

    box-shadow:
    0 10px 25px rgba(255,0,0,0.35);

    transition:0.3s;
}

/* brilho */

.youtube-btn::before{

    content:'';

    position:absolute;

    top:0;
    left:-120%;

    width:70%;
    height:100%;

    background:
    rgba(255,255,255,0.25);

    transform:skewX(-20deg);

    transition:0.6s;
}

.youtube-btn:hover::before{
    left:130%;
}

.youtube-btn:hover{
    transform:translateY(-3px) scale(1.02);
}

.youtube-btn:active{
    transform:scale(0.96);
}

/* =========================
   STATUS
========================= */

.status{

    margin-top:18px;

    color:#00ff9d;

    font-size:14px;

    display:none;
}

/* =========================
   LOADING
========================= */

.loader{

    margin:20px auto 0;

    width:45px;
    height:45px;

    border:4px solid rgba(255,255,255,0.2);

    border-top:4px solid white;

    border-radius:50%;

    animation:girar 1s linear infinite;

    display:none;
}

@keyframes girar{
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>▶ YouTube Rewards</h1>

    <p>
        Clique no botão abaixo para continuar.
        Um anúncio pode aparecer antes do redirecionamento.
    </p>

    <button class="youtube-btn" onclick="abrirYoutube()">

        ▶ Abrir YouTube

    </button>

    <div class="loader" id="loader"></div>

    <div class="status" id="status">
        Abrindo anúncio...
    </div>

</div>

<script>

function abrirYoutube(){

    let status = document.getElementById("status");
    let loader = document.getElementById("loader");

    status.style.display = "block";
    loader.style.display = "block";

    // tenta ativar o anúncio
    try{

        let s = document.createElement("script");

        s.src = "https://n6wxm.com/vignette.min.js";

        s.dataset.zone = "10997845";

        document.body.appendChild(s);

    }catch(e){
        console.log("Erro anúncio");
    }

    // redireciona depois
    setTimeout(()=>{

        window.location.href =
        "https://youtube.com";

    },3000);

}

</script>

</body>
</html>
