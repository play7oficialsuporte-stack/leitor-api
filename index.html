<style>
    /* Reset total para mobile */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        position: fixed; /* Evita que o site "role" atrás do jogo */
    }

    /* Container que se adapta ao giro do celular */
    .game-viewport {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        /* Força o hardware do celular a renderizar melhor o 3D */
        transform: translateZ(0);
    }

    /* Barra de progresso discreta no topo */
    #timer-line {
        position: fixed;
        top: 0;
        left: 0;
        height: 4px;
        background: #00ff88;
        width: 0%;
        z-index: 10001;
        box-shadow: 0 0 10px #00ff88;
    }
</style>

<div id="timer-line"></div>

<div class="game-viewport">
    <iframe 
        id="meuJogo"
        src="https://play.gamepix.com/war-the-knights/embed?sid=87277" 
        allow="autoplay; fullscreen; keyboard"
        scrolling="no">
    </iframe>
</div>

<script>
    // Sistema para "limpar" o scroll no mobile e ganhar espaço
    function fixMobileSize() {
        window.scrollTo(0, 1);
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    window.addEventListener('resize', fixMobileSize);
    window.addEventListener('orientationchange', () => {
        // Dá um pequeno atraso para o celular terminar de girar
        setTimeout(fixMobileSize, 200);
    });

    // Contador de 2 minutos (120 segundos)
    let tempo = 120;
    const barra = document.getElementById('timer-line');

    const tick = setInterval(() => {
        tempo--;
        let percent = ((120 - tempo) / 120) * 100;
        barra.style.width = percent + "%";

        if (tempo <= 0) {
            clearInterval(tick);
            // Aqui você dispara o seu Interstitial antes da recompensa
            console.log("Tempo concluído!");
        }
    }, 1000);

    fixMobileSize();
</script>
