<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaCloud - Toom Style</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Header sem Busca - Estilo Minimalista */
        header { 
            padding: 20px; 
            background: #000; 
            border-bottom: 2px solid var(--primary); 
            text-align: center;
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.8rem; letter-spacing: -1px; }

        .container { padding: 15px; }
        
        /* Título com Borda Lateral solicitado */
        .section-title { 
            font-size: 1.3rem; 
            margin: 10px 0 20px 0; 
            border-left: 5px solid var(--primary); 
            padding-left: 12px; 
            text-transform: uppercase;
        }

        /* Grid de Mangás */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
        }
        
        .manga-card { 
            background: var(--card-bg); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #222;
        }
        .manga-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        .manga-info { padding: 10px; font-size: 0.75rem; text-align: center; }
        .manga-info h4 { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .loading-msg { grid-column: 1/-1; text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">TOOM-CLONE</div>
    </header>

    <div class="container">
        <h2 class="section-title">Populares hoje</h2>
        <div id="lista-manga" class="grid">
            <div class="loading-msg">Carregando catálogo...</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function carregarCatalogo() {
            const container = document.getElementById('lista-manga');
            
            try {
                // Chama a lista sem termo de busca (pega os populares)
                const mangas = await getMangaList(""); 

                if (!mangas || mangas.length === 0) {
                    container.innerHTML = "<div class='loading-msg'>Nenhum mangá encontrado no servidor.</div>";
                    return;
                }
                
                container.innerHTML = mangas.map(m => `
                    <div class="manga-card" onclick="location.href='manga.html?id=${m.id}'">
                        <img src="${m.coverUrl}" onerror="this.src='https://via.placeholder.com/256x380?text=Sem+Capa'">
                        <div class="manga-info">
                            <h4>${m.title}</h4>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = "<div class='loading-msg' style='color:red;'>Erro ao conectar com a API.</div>";
            }
        }

        // Inicia assim que a página abre
        window.onload = carregarCatalogo;
    </script>
</body>
</html>
