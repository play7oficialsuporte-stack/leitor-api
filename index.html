    <script>
        const urlVast = "https://funny-tooth.com";
        let linkDestinoAtual = "";
        let meuPlayer = null;
        let travaSeguranca = null;

        // Executa a ação ao clicar em qualquer botão de missão
        document.querySelectorAll('.botao-missao').forEach(botao => {
            botao.addEventListener('click', function() {
                linkDestinoAtual = this.getAttribute('data-destino');
                abrirAnuncioEViajar();
            });
        });

        function abrirAnuncioEViajar() {
            // Exibe a tela preta de bloqueio
            document.getElementById('bloqueio-anuncio').style.display = 'flex';

            // Limpa travas anteriores se houver
            if (travaSeguranca) clearTimeout(travaSeguranca);

            // TRAVA DE SEGURANÇA: Se o anúncio não carregar em 3 segundos, redireciona de qualquer forma
            travaSeguranca = setTimeout(function() {
                console.log("Anúncio demorou para responder. Redirecionando por segurança...");
                redirecionarUsuario();
            }, 3000);

            // Se o player já existia de um clique anterior, destrói para resetar
            if (meuPlayer) {
                try { meuPlayer.destroy(); } catch(e) {}
            }

            // Inicializa o player de vídeo dinamicamente
            meuPlayer = fluidPlayer('player_vast', {
                layoutControls: {
                    autoPlay: true,
                    mute: true, // Forçar 'true' ajuda a ignorar bloqueios estritos de navegadores mobile
                    keyboardControl: false,
                    allowTheatre: false,
                    playbackRateControl: false,
                    playButtonShowing: false
                },
                vastOptions: {
                    adList: [{ roll: 'preRoll', vastTag: urlVast }]
                }
            });

            // Eventos normais do Player
            meuPlayer.on('vast.adEnd', redirecionarUsuario);
            meuPlayer.on('vast.adError', redirecionarUsuario); 
            meuPlayer.on('vast.adSkipped', redirecionarUsuario);
            
            // Se o player conseguir começar a rodar o vídeo, podemos limpar a trava ou deixar rodar
            meuPlayer.on('playing', function() {
                clearTimeout(travaSeguranca); 
            });
        }

        function redirecionarUsuario() {
            if (travaSeguranca) clearTimeout(travaSeguranca);
            if (linkDestinoAtual) {
                window.location.href = linkDestinoAtual;
            }
        }
    </script>
