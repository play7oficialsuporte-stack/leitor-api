<div id="missao-container" style="width: 100%; max-width: 480px; margin: auto; font-family: sans-serif; border: 1px solid #333; border-radius: 8px; overflow: hidden;">
    
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; color: white; padding: 12px;">
        <span id="status-text" style="font-size: 13px; color: #ffcc00;">Aguardando o jogo carregar...</span>
        <b id="timer-display" style="font-size: 18px; color: #ffcc00;">02:00</b>
    </div>

    <!-- Área do Jogo -->
    <div id="game-area" style="position: relative; width: 100%; padding-top: 66.66%; background: #000;">
        
        <!-- Overlay Inicial -->
        <div id="game-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <button id="btn-start" onclick="prepararJogo()" style="background: #e62117; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer;">
                JOGAR AGORA
            </button>
        </div>

        <!-- Iframe -->
        <iframe id="iframe-game" 
            style="position: absolute; top:0; left:0; width:100%; height:100%; border: none;" 
            src="" 
            allow="autoplay; gamepad">
        </iframe>
    </div>
</div>

<script>
    let tempo = 120;
    let jogoCarregado = false;
    let cronometroRodando = false;
    let intervalo;

    const statusTxt = document.getElementById('status-text');
    const timerTxt = document.getElementById('timer-display');
    const iframe = document.getElementById('iframe-game');
    const overlay = document.getElementById('game-overlay');

    // Função 1: Carrega o Iframe mas NÃO inicia o tempo
    function prepararJogo() {
        overlay.style.background = "rgba(0,0,0,0.7)";
        document.getElementById('btn-start').innerText = "CARREGANDO...";
        document.getElementById('btn-start').disabled = true;

        iframe.src = "https://play.gamepix.com/war-the-knights/embed?sid=77720";
        
        // Detecta quando o Iframe terminou de carregar o código base
        iframe.onload = function() {
            jogoCarregado = true;
            statusTxt.innerText = "Toque no jogo para validar!";
            overlay.style.display = 'none'; // Remove o bloqueio visual
        };
    }

    // Função 2: Inicia o cronômetro apenas quando o site perde o foco (toque no iframe)
    window.addEventListener('blur', function() {
        if (jogoCarregado && !cronometroRodando) {
            iniciarContagemReal();
        }
    });

    function iniciarContagemReal() {
        cronometroRodando = true;
        statusTxt.innerText = "Missão em andamento...";
        statusTxt.style.color = "#00ff00";

        intervalo = setInterval(() => {
            // Só diminui se a aba estiver aberta e ativa
            if (!document.hidden) {
                tempo--;
                
                let m = Math.floor(tempo / 60);
                let s = tempo % 60;
                timerTxt.innerText = (m < 10 ? '0'+m : m) + ":" + (s < 10 ? '0'+s : s);

                if (tempo <= 0) {
                    clearInterval(intervalo);
                    alert("MISSÃO CONCLUÍDA! Você já pode coletar sua recompensa.");
                    // Aqui você faz a chamada para o seu banco de dados
                }
            } else {
                statusTxt.innerText = "PAUSADO: Volte para o jogo!";
                statusTxt.style.color = "#ff4444";
            }
        }, 1000);
    }
</script>
