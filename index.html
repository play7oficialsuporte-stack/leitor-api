<div id="missao-container" style="width: 100%; max-width: 480px; margin: auto; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; position: relative; border-radius: 15px; overflow: hidden; border: 1px solid #111;">
    
    <!-- ÁREA DO JOGO (LIMPEZA TOTAL) -->
    <div id="game-area" style="position: relative; width: 100%; padding-top: 150%; background: #000;">
        
        <!-- Overlay Inicial (Botão Play) -->
        <div id="game-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 50; display: flex; align-items: center; justify-content: center;">
            <button id="btn-start" onclick="prepararJogo()" style="background: #00ff66; color: #000; border: none; padding: 16px 40px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0,255,102,0.3);">
                JOGAR AGORA
            </button>
        </div>

        <!-- Iframe do Jogo -->
        <iframe id="iframe-game" 
            style="position: absolute; top:0; left:0; width:100%; height:100%; border: none;" 
            src="" 
            allow="autoplay; gamepad">
        </iframe>
    </div>

    <!-- MODAL DE RECOMPENSA (SURGE APÓS 2 MINUTOS) -->
    <div id="modal-ganhou" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: surgeSuave 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <div style="background: #111; border: 2px solid #00ff66; border-radius: 25px; padding: 35px; width: 85%; box-shadow: 0 0 50px rgba(0,255,102,0.2);">
            <div style="font-size: 65px; margin-bottom: 15px;">✅</div>
            <h2 style="color: #fff; margin: 0; font-size: 24px; font-weight: 800;">Missão Concluída!</h2>
            <p style="color: #00ff66; font-size: 15px; margin: 12px 0 25px; font-weight: 500;">O seu saldo foi creditado na Play7.</p>
            <button onclick="location.reload()" style="background: #00ff66; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px;">COLETAR AGORA</button>
        </div>
    </div>
</div>

<style>
    @keyframes surgeSuave { 
        from { opacity: 0; transform: translateY(30px) scale(0.9); } 
        to { opacity: 1; transform: translateY(0) scale(1); } 
    }
    #btn-start:active { transform: scale(0.95); }
</style>

<script>
    const TEMPO_NECESSARIO = 120; // 2 minutos em segundos
    let segundosContados = 0;
    let jogoIniciado = false;
    let cronometroAtivo = false;
    let loopMissao;

    const iframe = document.getElementById('iframe-game');
    const overlay = document.getElementById('game-overlay');
    const modal = document.getElementById('modal-ganhou');

    // Inicia o carregamento do jogo
    function prepararJogo() {
        document.getElementById('btn-start').innerText = "CARREGANDO...";
        iframe.src = "https://play.gamepix.com/war-the-knights/embed?sid=77720";
        
        iframe.onload = () => {
            jogoIniciado = true;
            overlay.style.display = 'none';
        };
    }

    // O cronômetro só começa quando o usuário clica/interage com o iframe (perda de foco da página pai)
    window.addEventListener('blur', () => {
        if (jogoIniciado && !cronometroAtivo) {
            cronometroAtivo = true;
            
            loopMissao = setInterval(() => {
                // Só conta se o usuário não minimizou o navegador
                if (!document.hidden) {
                    segundosContados++;
                    
                    if (segundosContados >= TEMPO_NECESSARIO) {
                        clearInterval(loopMissao);
                        finalizarMissao();
                    }
                }
            }, 1000);
        }
    });

    function finalizarMissao() {
        modal.style.display = 'flex';
        // Se quiser integrar com seu banco de dados, chame sua função aqui.
    }
</script>
