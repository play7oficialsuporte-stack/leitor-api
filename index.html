<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reward Missions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111827;
    color:white;
}

header{
    background:#1f2937;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #374151;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.balance{
    background:#10b981;
    padding:10px 15px;
    border-radius:12px;
    font-weight:bold;
}

.flags{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.flag{
    width:35px;
    height:25px;
    border-radius:5px;
    cursor:pointer;
    border:2px solid white;
}

.container{
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:18px;
    margin-top:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.mission-title{
    font-size:22px;
    margin-bottom:10px;
}

.reward{
    color:#22c55e;
    margin-bottom:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

#adModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.ad-box{
    width:90%;
    max-width:400px;
    background:white;
    color:black;
    border-radius:18px;
    overflow:hidden;
    text-align:center;
}

.ad-header{
    background:#2563eb;
    color:white;
    padding:12px;
    font-weight:bold;
}

.ad-content{
    padding:20px;
}

.fake-banner{
    background:#e5e7eb;
    height:180px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    margin-bottom:20px;
}

.countdown{
    margin-bottom:15px;
    font-weight:bold;
}

.hidden{
    display:none;
}

.requirements{
    display:none;
    margin-top:25px;
    background:#0f172a;
    padding:20px;
    border-radius:18px;
}

.requirements h2{
    margin-bottom:10px;
}

.requirements ul{
    margin-left:20px;
    line-height:1.8;
}
</style>
</head>

<body>

<header>
    <div>
        <div class="logo">Reward App</div>

        <div class="flags">
            <img class="flag" src="https://flagcdn.com/w40/br.png">
            <img class="flag" src="https://flagcdn.com/w40/us.png">
            <img class="flag" src="https://flagcdn.com/w40/es.png">
        </div>
    </div>

    <div class="balance">
        Saldo: R$ 24,50
    </div>
</header>

<div class="container">

    <div class="card">
        <div class="mission-title">Missão 1</div>
        <div class="reward">Ganhe +R$ 2,00</div>

        <button onclick="openAd()">
            Iniciar Missão
        </button>
    </div>

    <div class="requirements" id="requirements">
        <h2>Requisitos da Missão</h2>

        <ul>
            <li>Assistir o vídeo por 30 segundos</li>
            <li>Fazer login no aplicativo</li>
            <li>Concluir o cadastro</li>
        </ul>
    </div>

</div>

<div id="adModal">

    <div class="ad-box">

        <div class="ad-header">
            Publicidade
        </div>

        <div class="ad-content">

            <div class="fake-banner">
                SEU ANÚNCIO
            </div>

            <div class="countdown" id="countdown">
                Aguarde 5 segundos...
            </div>

            <button id="continueBtn" class="hidden" onclick="goRequirements()">
                Continuar
            </button>

        </div>

    </div>

</div>

<script>
let seconds = 5;

function openAd(){
    document.getElementById("adModal").style.display = "flex";

    seconds = 5;

    document.getElementById("continueBtn").classList.add("hidden");

    const countdown = document.getElementById("countdown");

    countdown.innerText = `Aguarde ${seconds} segundos...`;

    let timer = setInterval(() => {

        seconds--;

        countdown.innerText = `Aguarde ${seconds} segundos...`;

        if(seconds <= 0){

            clearInterval(timer);

            countdown.innerText = "Anúncio concluído!";

            document.getElementById("continueBtn").classList.remove("hidden");
        }

    },1000);
}

function goRequirements(){

    document.getElementById("adModal").style.display = "none";

    document.getElementById("requirements").style.display = "block";

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
}
</script>

</body>
</html>
