<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TOOM-CLONE | Home</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; background: #000; border-bottom: 2px solid var(--primary); text-align: center; }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { padding: 15px; }
        .section-label { padding-left: 12px; border-left: 5px solid var(--primary); font-weight: bold; text-transform: uppercase; margin: 20px 0; }
        
        /* Grid de Mangás */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .manga-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #222; }
        .manga-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .manga-info { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <header><div class="logo">TOOM-CLONE</div></header>

    <div class="container">
        <div class="section-label">Populares Hoje</div>
        
        <div class="grid">
            <a href="Devilman.html" class="manga-card">
                <img src="https://uploads.mangadex.org/covers/4393fd4e-d646-4bab-9c95-786168ccb618/3199fa66-3a73-4c11-9236-9cba765e6650.jpg.256.jpg">
                <div class="manga-info">Devilman</div>
            </a>

            <div class="manga-card" style="opacity: 0.4;">
                <img src="https://via.placeholder.com/256x384/111/333?text=?">
                <div class="manga-info">Em breve</div>
            </div>

            <div class="manga-card" style="opacity: 0.4;">
                <img src="https://via.placeholder.com/256x384/111/333?text=?">
                <div class="manga-info">Em breve</div>
            </div>
        </div>
    </div>

</body>
</html>
