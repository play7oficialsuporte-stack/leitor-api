<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão de Notificação com Recompensa</title>
    <style>
        /* Transforma o link visualmente em um botão vintage */
        .btn-vintage-anuncio {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Georgia', serif;
            color: #3e2723;
            background-color: #f4ecd8;
            border: 3px double #8b5a2b;
            border-radius: 4px;
            text-decoration: none; /* Remove o sublinhado de link */
            font-weight: bold;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            text-align: center;
            cursor: pointer;
        }

        .btn-vintage-anuncio:hover {
            background-color: #eaddc3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Link real configurado com a classe visual de botão -->
    <!-- Substitua o href pelo seu link de afiliado do Mercado Livre se necessário -->
    <a href="https://mercadolivre.com.br" target="_blank" class="btn-vintage-anuncio">
        🔔 Ativar Notificações & Ver Oferta
    </a>

    <!-- O script roda assim que a página abre, monitorando os links da tela -->
    <script>
        (function(s){
            s.dataset.zone='10997845';
            s.src='https://n6wxm.com';
        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
    </script>

</body>
</html>
