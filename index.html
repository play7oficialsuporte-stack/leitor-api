<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TOOM-CLONE | Premium</title>
    <style>
        :root { --primary: #ff1212; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; background: #000; border-bottom: 2px solid var(--primary); text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; color: var(--primary); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 15px; }
        .section-title { font-size: 1.3rem; margin: 10px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 12px; text-transform: uppercase; }
        
        /* Grid de Cards */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .manga-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; text-decoration: none; color: white; transition: 0.3s; }
        .manga-card:active { transform: scale(0.95); border-color: var(--primary); }
        .manga-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #222; }
        .manga-info { padding: 8px; font-size: 0.7rem; text-align: center; font-weight: bold; }
        .manga-info h4 { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <header><div class="logo">TOOM-CLONE</div></header>

    <div class="container">
        <h2 class="section-title">Populares hoje</h2>
        <div class="grid">

            <a href="devilman.html" class="manga-card">
                <img src="https://uploads.mangadex.org/covers/4393fd4e-d646-4bab-9c95-786168ccb618/3199fa66-3a73-4c11-9236-9cba765e6650.jpg.256.jpg" referrerpolicy="no-referrer">
                <div class="manga-info"><h4>Devilman</h4></div>
            </a>

            <div class="manga-card" style="opacity: 0.3;">
                <img src="https://via.placeholder.com/256x384/111/333?text=Breve" referrerpolicy="no-referrer">
                <div class="manga-info"><h4>Em breve</h4></div>
            </div>

        </div>
    </div>

</body>
</html>
