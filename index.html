<div id="missao-container" style="width: 100%; max-width: 480px; margin: auto; font-family: sans-serif; background: #000; position: relative; border-radius: 12px; overflow: hidden;">
    
    <!-- BARRA FLUTUANTE (Não ocupa espaço no layout) -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.3); z-index: 50;">
        <div id="progress-bar" style="width: 100%; height: 100%; background: #00ff66; transition: width 1s linear; box-shadow: 0 2px 10px rgba(0,255,102,0.8);"></div>
    </div>

    <!-- STATUS DISCRETO (Aparece apenas quando pausado) -->
    <div id="status-float" style="position: absolute; top: 10px; width: 100%; text-align: center; z-index: 40; pointer-events: none;">
        <span id="status-text" style="font-size: 10px; color: rgba(0,255,102,0.5); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;"></span>
    </div>

    <!-- ÁREA DO JOGO (Ocupa a tela cheia do container) -->
    <div id="game-area" style="position: relative; width: 100%; padding-top: 150%; background: #000;">
        
        <!-- Overlay Inicial -->
        <div id="game-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 60; display: flex; align-items: center; justify-content: center;">
            <button id="btn-start" onclick="prepararJogo()" style="background: #00ff66; color: #000; border: none; padding: 15px 35px; border-radius: 8px; font-weight: 900; cursor: pointer;">JOGAR AGORA</button>
        </div>

        <iframe id="iframe-game" style="position: absolute; top:0; left:0; width:100%; height:100%; border: none;" src="" allow="autoplay; gamepad"></iframe>
    </div>

    <!-- MODAL PLAY7 SUCESSO -->
    <div id="modal-ganhou" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: msgEntrada 0.4s ease-out;">
        <div style="background: #111; border: 2px solid #00ff66; border-radius: 20px; padding: 25px; width: 80%;">
            <h2 style="color: #fff; margin-bottom: 5px;">R$ Saldo Ganho!</h2>
            <p style="color: #00ff66; font-size: 13px; margin-bottom: 20px;">Sua missão na Play7 foi validada.</p>
            <button onclick="location.reload()" style="background: #00ff66; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;">COLETAR</button>
        </div>
    </div>
</div>

<style>
    @keyframes msgEntrada { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>

<script>
    const TEMPO_TOTAL = 120;
    let tempoRestante = TEMPO_TOTAL;
    let jogoCarregado = false;
    let cronometroRodando = false;
    let intervalo;

    const statusTxt = document.getElementById('status-text');
    const progressBar = document.getElementById('progress-bar');
    const iframe = document.getElementById('iframe-game');
    const overlay = document.getElementById('game-overlay');
    const modal = document.getElementById('modal-ganhou');

    function prepararJogo() {
        document.getElementById('btn-start').innerText = "CARREGANDO...";
        iframe.src = "https://play.gamepix.com/war-the-knights/embed?sid=77720";
        iframe.onload = () => {
            jogoCarregado = true;
            overlay.style.display = 'none';
        };
    }

    window.addEventListener('blur', () => {
        if (jogoCarregado && !cronometroRodando) {
            cronometroRodando = true;
            intervalo = setInterval(() => {
                if (!document.hidden) {
                    tempoRestante--;
                    progressBar.style.width = (tempoRestante / TEMPO_TOTAL) * 100 + "%";
                    statusTxt.innerText = ""; // Limpa aviso se estiver tudo OK

                    if (tempoRestante <= 0) {
                        clearInterval(intervalo);
                        modal.style.display = 'flex';
                    }
                } else {
                    statusTxt.innerText = "PAUSADO: VOLTE AO JOGO";
                    statusTxt.style.color = "#ff4444";
                }
            }, 1000);
        }
    });
</script>
