<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor - MangaCloud</title>
    <style>
        body { background: #000; margin: 0; padding: 0; }
        #reader { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; }
        #reader img { width: 100%; height: auto; display: block; margin: 0; padding: 0; border: none; }
        .btn-voltar { position: fixed; top: 10px; left: 10px; background: rgba(255,0,0,0.7); color: white; border: none; padding: 10px; border-radius: 5px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn-voltar" onclick="window.history.back()">← Sair</button>
    <div id="reader">Carregando imagens...</div>

    <script src="js/api.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        async function loadReader() {
            const resp = await fetch(`https://api.mangadex.org/at-home/server/${id}`);
            const data = await resp.json();
            const { hash, data: files } = data.chapter;
            const baseUrl = data.baseUrl;
            const container = document.getElementById('reader');
            container.innerHTML = files.map(f => `<img src="${baseUrl}/data/${hash}/${f}" loading="lazy">`).join('');
        }
        if(id) loadReader();
    </script>
</body>
</html>
