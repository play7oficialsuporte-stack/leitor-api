<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Mangakai</title>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .manga-page { width: 100%; max-width: 800px; display: block; }
        .nav-reader { width: 100%; background: #111; padding: 15px 0; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; }
        .btn-nav { background: #ff1212; color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="nav-reader">
        <a href="index.html" class="btn-nav">HOME</a>
        <a href="devilman.html" class="btn-nav">VOLTAR</a>
    </div>

    <div id="pages-container">
        </div>

    <script>
        // Exemplo manual: se você subiu 10 imagens no GitHub
        const container = document.getElementById('pages-container');
        const totalPaginas = 10; // Mude conforme o número de fotos que você baixar
        const pastaManga = "mangas/devilman/cap1/"; // Caminho da sua pasta no GitHub

        for (let i = 1; i <= totalPaginas; i++) {
            const img = document.createElement('img');
            // Formata o número para 01, 02, etc.
            let num = i < 10 ? '0' + i : i;
            img.src = `${pastaManga}${num}.jpg`;
            img.className = 'manga-page';
            container.appendChild(img);
        }
    </script>
</body>
</html>
